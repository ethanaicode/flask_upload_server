upstream flask_upload_server_backend {
    server 127.0.0.1:8900;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Match Flask MAX_CONTENT_LENGTH (2GB) to avoid nginx 413 on uploads.
    client_max_body_size 2048m;

    location / {
        proxy_pass http://flask_upload_server_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Better behavior for large upload requests.
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
