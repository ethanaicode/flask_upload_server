<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传服务</title>
    <style>
        :root {
            color-scheme: light;
            --bg: linear-gradient(135deg, #f4efe6 0%, #dbe7f3 100%);
            --card: rgba(255, 252, 247, 0.92);
            --border: rgba(45, 76, 99, 0.16);
            --text: #1f2a33;
            --muted: #5f6f7b;
            --accent: #166534;
            --accent-strong: #14532d;
            --danger: #b42318;
            --danger-soft: #fef3f2;
            --success-soft: #ecfdf3;
            --shadow: 0 18px 50px rgba(31, 42, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
        }

        .page {
            width: min(960px, calc(100vw - 32px));
            margin: 40px auto;
            display: grid;
            gap: 20px;
        }

        .hero,
        .results {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .hero {
            padding: 28px;
        }

        .hero h2,
        .results h3 {
            margin: 0;
            font-weight: 700;
        }

        .hero p {
            margin: 12px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            margin-top: 24px;
            display: grid;
            gap: 16px;
        }

        .upload-box {
            border: 1.5px dashed rgba(22, 101, 52, 0.28);
            border-radius: 18px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.65);
            cursor: pointer;
            transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
        }

        .upload-box.drag-over {
            border-color: var(--accent);
            background: rgba(236, 253, 243, 0.9);
            transform: translateY(-1px);
        }

        .upload-main {
            font-size: 15px;
            font-weight: 700;
        }

        .upload-sub {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
        }

        #file-input {
            display: none;
        }

        .selected-files {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
            word-break: break-all;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.65;
            cursor: wait;
            transform: none;
        }

        .hint,
        .status-text {
            color: var(--muted);
            font-size: 14px;
        }

        .results {
            padding: 24px;
        }

        .results-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .empty-state {
            padding: 24px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.55);
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid rgba(45, 76, 99, 0.1);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.72);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        th,
        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(45, 76, 99, 0.08);
            text-align: left;
            vertical-align: top;
        }

        th {
            font-size: 13px;
            letter-spacing: 0.02em;
            color: var(--muted);
            background: rgba(219, 231, 243, 0.42);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge.success {
            color: var(--accent-strong);
            background: var(--success-soft);
        }

        .badge.error {
            color: var(--danger);
            background: var(--danger-soft);
        }

        a {
            color: var(--accent-strong);
        }

        @media (max-width: 720px) {
            .page {
                width: calc(100vw - 20px);
                margin: 20px auto;
            }

            .hero,
            .results {
                border-radius: 20px;
                padding: 20px;
            }

            th,
            td {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <h2>文件上传服务</h2>
            <p>支持多文件选择、拖拽上传，同名文件会在服务器端自动追加序号。</p>

            <form id="upload-form" enctype="multipart/form-data">
                <div id="drop-zone" class="upload-box">
                    <div class="upload-main">点击选择文件，或将文件拖拽到这里</div>
                    <div class="upload-sub">可一次选择多个文件上传</div>
                    <input id="file-input" type="file" name="files" multiple>
                    <div id="selected-files" class="selected-files">当前未选择文件</div>
                </div>
                <div class="actions">
                    <button id="submit-button" type="submit">上传</button>
                    <span id="status-text" class="status-text">等待选择文件</span>
                </div>
                <div class="hint">支持多次上传，新的结果会持续追加到页面中。</div>
            </form>
        </section>

        <section class="results">
            <div class="results-head">
                <h3>上传结果</h3>
                <span class="hint">展示本次页面会话中的上传记录</span>
            </div>

            <div id="empty-state" class="empty-state">暂无上传记录，上传后会在这里追加结果。</div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>上传文件</th>
                            <th>保存文件名</th>
                            <th>结果</th>
                            <th>说明</th>
                            <th>访问地址</th>
                        </tr>
                    </thead>
                    <tbody id="result-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById('upload-form');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const selectedFilesText = document.getElementById('selected-files');
        const submitButton = document.getElementById('submit-button');
        const statusText = document.getElementById('status-text');
        const resultBody = document.getElementById('result-body');
        const emptyState = document.getElementById('empty-state');

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, function(char) {
                const entityMap = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                };
                return entityMap[char] || char;
            });
        }

        function updateSelectedFilesText(files) {
            if (!files || files.length === 0) {
                selectedFilesText.textContent = '当前未选择文件';
                return;
            }

            const names = Array.from(files).map(function(file) {
                return file.name;
            });
            selectedFilesText.textContent = '已选择 ' + names.length + ' 个文件: ' + names.join(' | ');
        }

        function appendResultRow(record) {
            emptyState.style.display = 'none';

            const ok = record.status === 1;
            const statusClass = ok ? 'success' : 'error';
            const statusLabel = ok ? '成功' : '失败';
            const fileLink = ok && record.url
                ? '<a href="' + escapeHtml(record.url) + '" target="_blank" rel="noreferrer">查看文件</a>'
                : '-';

            const row = document.createElement('tr');
            row.innerHTML =
                '<td>' + escapeHtml(new Date().toLocaleString('zh-CN')) + '</td>' +
                '<td>' + escapeHtml(record.original_filename || '-') + '</td>' +
                '<td>' + escapeHtml(record.filename || '-') + '</td>' +
                '<td><span class="badge ' + statusClass + '">' + statusLabel + '</span></td>' +
                '<td>' + escapeHtml(record.message || '-') + '</td>' +
                '<td>' + fileLink + '</td>';

            resultBody.prepend(row);
        }

        dropZone.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function() {
            updateSelectedFilesText(fileInput.files);
        });

        ['dragenter', 'dragover'].forEach(function(eventName) {
            dropZone.addEventListener(eventName, function(event) {
                event.preventDefault();
                event.stopPropagation();
                dropZone.classList.add('drag-over');
            });
        });

        ['dragleave', 'drop'].forEach(function(eventName) {
            dropZone.addEventListener(eventName, function(event) {
                event.preventDefault();
                event.stopPropagation();
                dropZone.classList.remove('drag-over');
            });
        });

        dropZone.addEventListener('drop', function(event) {
            const droppedFiles = event.dataTransfer.files;
            if (!droppedFiles || droppedFiles.length === 0) {
                return;
            }

            const transfer = new DataTransfer();
            Array.from(droppedFiles).forEach(function(file) {
                transfer.items.add(file);
            });
            fileInput.files = transfer.files;
            updateSelectedFilesText(fileInput.files);
        });

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            const selectedFiles = fileInput.files;
            if (!selectedFiles || selectedFiles.length === 0) {
                statusText.textContent = '请先选择至少一个文件';
                return;
            }

            const formData = new FormData();
            Array.from(selectedFiles).forEach(function(file) {
                formData.append('files', file);
            });

            submitButton.disabled = true;
            statusText.textContent = '正在上传 ' + selectedFiles.length + ' 个文件...';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const payload = await response.json();
                const results = Array.isArray(payload.results) ? payload.results : [];

                if (results.length === 0) {
                    appendResultRow({
                        status: 0,
                        original_filename: '-',
                        filename: '-',
                        message: payload.message || '服务器未返回文件结果',
                        url: ''
                    });
                } else {
                    results.forEach(function(item) {
                        appendResultRow(item);
                    });
                }

                if (response.ok && payload.status === 1) {
                    statusText.textContent = payload.message || '上传完成';
                    form.reset();
                    updateSelectedFilesText([]);
                } else {
                    statusText.textContent = payload.message || '上传失败';
                }
            } catch (error) {
                appendResultRow({
                    status: 0,
                    original_filename: '-',
                    filename: '-',
                    message: '请求失败，请检查服务状态或返回内容是否为 JSON',
                    url: ''
                });
                statusText.textContent = '请求失败';
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
